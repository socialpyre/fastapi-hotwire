[project]
name = "fastapi-hotwire"
version = "0.0.0"
description = "Hotwire (Turbo) integration for FastAPI — turbo-stream responses, frame detection, block rendering, flash, and test helpers."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [{ name = "Dane Thurber" }]
keywords = [
    "fastapi",
    "hotwire",
    "turbo",
    "stimulus",
    "jinja2",
    "html",
    "server-rendered",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/danethurber/fastapi-hotwire"
Source = "https://github.com/danethurber/fastapi-hotwire"
Issues = "https://github.com/danethurber/fastapi-hotwire/issues"
Changelog = "https://github.com/danethurber/fastapi-hotwire/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fastapi_hotwire"]
